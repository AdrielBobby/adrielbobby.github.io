<!doctype html>
<!-- 'doctype html' tells the browser to render this as modern HTML5, not legacy HTML. -->
<html lang="en">
  <!-- 'lang="en"' helps screen readers and search engines know the page language. -->
  <head>
    <!-- Everything inside <head> is NOT visible on the page — it's metadata for the browser. -->

    <!-- UTF-8 lets the browser display all unicode characters (emojis, special symbols, etc.) -->
    <meta charset="UTF-8" />

    <!-- 'viewport' makes the page responsive on mobile.
         width=device-width  → match the screen width instead of assuming a desktop size.
         initial-scale=1.0   → no zoom on first load. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 'description' is what search engines show under your site title in Google results. -->
    <meta name="description" content="Adriel Bobby — Computer Science Engineer and Cybersecurity Enthusiast" />

    <!-- The tab title shown in the browser. -->
    <title>Adriel Bobby | Portfolio</title>

    <!-- A small icon shown in the browser tab (the favicon).
         We reference a file at /favicon.svg — Vite serves everything in public/ at the root URL. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="module" crossorigin src="/assets/index-CzO0NwOv.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BFFovH2q.css">
  </head>
  <body>
    <!-- This single <div id="root"> is where React will inject the entire app.
         React replaces the empty div with all your components at runtime. -->
    <div id="root"></div>

    <!-- This loads our main JavaScript file.
         type="module" enables ES Module syntax (import/export) in the browser.
         Vite compiles src/main.jsx and all its imports into this bundle. -->
  </body>
</html>
